name: Apply Supabase migrations

# Runs `supabase db push` against the linked production project whenever
# a new migration lands on main. Also dispatchable manually from the
# Actions tab.
#
# Required secrets (Repo > Settings > Secrets and variables > Actions):
#   SUPABASE_ACCESS_TOKEN  Personal access token (Supabase account settings)
#   SUPABASE_PROJECT_ID    The project ref (from dashboard URL or settings)
#   SUPABASE_DB_PASSWORD   The project's database password
#
# Scope: this applies migrations only. Seeds do NOT run in production —
# production data is curated, not placeholder.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/db-migrate.yml"
  workflow_dispatch:

concurrency:
  group: supabase-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      # Force JS actions to use Node 24 until all of our deps (notably
      # supabase/setup-cli) publish Node-24-native releases. Remove once
      # Node 24 becomes the runner default (June 2026).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push migrations
        run: supabase db push --include-all
